<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DreamStory — Настройки кампании</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #0d0d0d; color: #c9c9c9; min-height: 100vh; }
.nav { display:flex; align-items:center; background:#111; border-bottom:1px solid #1e1e1e; padding:0 1.5rem; height:46px; position:sticky; top:0; z-index:10; }
.nav-brand { font-size:12px; letter-spacing:.18em; color:#4caf72; flex-shrink:0; }
.nav-links { display:flex; align-items:center; gap:.25rem; flex-shrink:0; margin-left:auto; }
.nav-link { font-family:monospace; font-size:10px; letter-spacing:.08em; color:#444; text-decoration:none; padding:.3rem .7rem; border:1px solid transparent; border-radius:3px; transition:all .2s; white-space:nowrap; }
.nav-link:hover { color:#c9c9c9; border-color:#2a2a2a; }
.nav-link.active { color:#4caf72; border-color:#4caf7230; }
.nav-campaign { font-size:11px; color:#333; padding:0 1.5rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.page { padding:1.75rem 1.5rem; max-width:780px; margin:0 auto; }
.box { background:#181818; border:1px solid #2a2a2a; border-radius:6px; padding:1.25rem 1.5rem; margin-bottom:1rem; }
.box-title { font-size:10px; letter-spacing:.12em; color:#444; margin-bottom:1rem; padding-bottom:.6rem; border-bottom:1px solid #1e1e1e; }
input[type=text] { width:100%; background:#111; border:1px solid #222; border-radius:3px; padding:.5rem .75rem; color:#ccc; font-family:monospace; font-size:12px; outline:none; transition:border-color .2s; margin-bottom:.75rem; }
input[type=text]:focus { border-color:#4a8fcc; }
textarea { width:100%; background:#111; border:1px solid #222; border-radius:3px; padding:.6rem .75rem; color:#ccc; font-family:monospace; font-size:12px; outline:none; resize:vertical; line-height:1.6; transition:border-color .2s; margin-bottom:.75rem; }
textarea:focus { border-color:#4a8fcc; }
.field-label { font-size:10px; letter-spacing:.1em; color:#555; display:block; margin-bottom:.35rem; }
.char-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
@media(max-width:600px){ .char-grid { grid-template-columns:1fr; } }
.char-card { background:#131313; border:1px solid #222; border-radius:6px; padding:1rem 1.1rem; }
.char-num { font-size:10px; letter-spacing:.1em; color:#4caf72; display:block; margin-bottom:.85rem; }
.char-field { margin-bottom:.65rem; }
.char-field:last-child { margin-bottom:0; }
.char-field label { font-size:10px; letter-spacing:.08em; color:#555; display:block; margin-bottom:.3rem; }
.char-field input { margin-bottom:0; }
.char-field textarea { margin-bottom:0; min-height:70px; }
.art-upload { display:flex; align-items:center; gap:.75rem; }
.art-thumb { width:44px; height:44px; border-radius:4px; border:1px solid #2a2a2a; object-fit:cover; flex-shrink:0; }
.art-placeholder { width:44px; height:44px; border-radius:4px; border:1px dashed #2a2a2a; background:#111; display:flex; align-items:center; justify-content:center; font-size:16px; color:#2a2a2a; flex-shrink:0; }
.art-btn { font-size:10px; padding:.3rem .65rem; color:#555; border:1px solid #2a2a2a; background:transparent; border-radius:3px; cursor:pointer; font-family:monospace; transition:all .2s; }
.art-btn:hover { color:#4a8fcc; border-color:#4a8fcc; }
.save-bar { display:flex; align-items:center; gap:1rem; }
button.save { font-family:monospace; font-size:11px; letter-spacing:.1em; padding:.55rem 1.25rem; border:1px solid #4caf7260; background:transparent; color:#4caf72; cursor:pointer; border-radius:3px; transition:all .2s; }
button.save:hover { background:#4caf7215; }
.save-status { font-size:11px; color:#4caf72; opacity:0; transition:opacity .3s; }
.row { display:flex; align-items:center; gap:.75rem; margin-bottom:.75rem; }
.row label { font-size:10px; letter-spacing:.08em; color:#555; flex-shrink:0; min-width:100px; }
.row input { flex:1; margin-bottom:0; }
.hint { font-size:11px; color:#3a3a3a; font-style:italic; margin-bottom:.5rem; }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">✦ DREAMSTORY</span>
  <span class="nav-campaign" id="nav-campaign-name"></span>
  <div class="nav-links">
    <a class="nav-link" href="/">← Кампании</a>
    <a class="nav-link" href="/campaign.html">Сессии</a>
    <a class="nav-link active" href="/settings.html">Настройки кампании</a>
  </div>
</nav>

<div class="page">

  <div class="box">
    <div class="box-title">МИР И СЕТТИНГ</div>
    <p class="hint">Эти настройки общие для всей кампании — попадают в каждую сессию автоматически.</p>
    <label class="field-label">НАЗВАНИЕ МИРА / КАМПАНИИ</label>
    <input type="text" id="s-world-name" placeholder="Forgotten Realms, Curse of Strahd..." />
    <label class="field-label">ОПИСАНИЕ СЕТТИНГА</label>
    <textarea id="s-world-desc" rows="4" placeholder="Тёмное фэнтези, средневековье..."></textarea>
    <label class="field-label">ХУДОЖЕСТВЕННЫЙ СТИЛЬ для image gen</label>
    <input type="text" id="s-art-style" placeholder="dark fantasy illustration, detailed, dramatic lighting" />
  </div>

  <div class="box">
    <div class="box-title">ПАРАМЕТРЫ ЗАПИСИ ПО УМОЛЧАНИЮ</div>
    <div class="row"><label>Язык Whisper</label><input type="text" id="s-lang" value="ru" style="max-width:80px;" /></div>
    <div class="row"><label>Чанк (сек)</label><input type="text" id="s-chunk" value="30" style="max-width:80px;" /></div>
    <div class="row"><label>VAD порог</label><input type="text" id="s-vad" value="10" style="max-width:80px;" /></div>
  </div>

  <div class="box">
    <div class="box-title">ПЕРСОНАЖИ ПАРТИИ</div>
    <p class="hint">Описания внешности попадают в каждый image prompt для консистентности визуала.</p>
    <div class="char-grid" id="char-grid"></div>
  </div>

  <div class="box" style="background:transparent;border-color:#1a1a1a;">
    <div class="save-bar">
      <button class="save" id="btn-save">СОХРАНИТЬ</button>
      <span class="save-status" id="save-status">Сохранено ✓</span>
    </div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
const CAMPAIGN_ID   = localStorage.getItem("active-campaign-id");
const CAMPAIGN_NAME = localStorage.getItem("active-campaign-name") || "Кампания";
const SESSION_ID    = localStorage.getItem("active-session-id");
const TOKEN         = localStorage.getItem("sb-token");

if (!CAMPAIGN_ID || !TOKEN) window.location.href = "/";

$("nav-campaign-name").textContent = CAMPAIGN_NAME;

const api = (path, opts = {}) => fetch(path, {
  ...opts,
  headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}`, ...(opts.headers||{}) },
}).then(r => r.json());

const buildCharCards = (chars) => {
  const grid = $("char-grid");
  grid.innerHTML = "";
  chars.forEach((ch, i) => {
    const card = document.createElement("div");
    card.className = "char-card";
    const num = document.createElement("span");
    num.className = "char-num"; num.textContent = `ПЕРСОНАЖ ${i+1}`;
    card.appendChild(num);
    const makeField = (labelText, id, type, placeholder, value) => {
      const wrap = document.createElement("div"); wrap.className = "char-field";
      const lbl = document.createElement("label"); lbl.textContent = labelText;
      wrap.appendChild(lbl);
      let inp;
      if (type === "textarea") { inp = document.createElement("textarea"); inp.rows=3; inp.placeholder=placeholder; inp.textContent=value||""; }
      else { inp = document.createElement("input"); inp.type="text"; inp.placeholder=placeholder; inp.value=value||""; }
      inp.id = id; wrap.appendChild(inp); return wrap;
    };
    card.appendChild(makeField("ИМЯ", `c${i}-name`, "text", "Имя персонажа", ch.name));
    card.appendChild(makeField("КЛАСС / РАСА", `c${i}-race`, "text", "Паладин, человек", ch.race));
    card.appendChild(makeField("ОПИСАНИЕ ВНЕШНОСТИ", `c${i}-appearance`, "textarea", "Внешность для image prompt...", ch.appearance));
    const artWrap = document.createElement("div"); artWrap.className = "char-field";
    const artLbl = document.createElement("label"); artLbl.textContent = "РЕФЕРЕНС-АРТ";
    artWrap.appendChild(artLbl);
    const artRow = document.createElement("div"); artRow.className = "art-upload";
    const artEl = document.createElement(ch.art ? "img" : "div");
    artEl.id = `c${i}-art`; artEl.dataset.src = ch.art||"";
    if (ch.art) { artEl.className="art-thumb"; artEl.src=ch.art; }
    else { artEl.className="art-placeholder"; artEl.textContent="✦"; }
    artRow.appendChild(artEl);
    const btns = document.createElement("div"); btns.style.cssText="display:flex;flex-direction:column;gap:.4rem;";
    const btnUp = document.createElement("button"); btnUp.className="art-btn"; btnUp.textContent="Загрузить"; btnUp.onclick=()=>$(`c${i}-file`).click();
    const btnCl = document.createElement("button"); btnCl.className="art-btn"; btnCl.style.cssText="border-color:#c0504040;color:#c05040;"; btnCl.textContent="Удалить";
    btnCl.onclick=()=>{ const ph=document.createElement("div"); ph.className="art-placeholder"; ph.id=`c${i}-art`; ph.dataset.src=""; ph.textContent="✦"; $(`c${i}-art`).replaceWith(ph); };
    btns.appendChild(btnUp); btns.appendChild(btnCl); artRow.appendChild(btns);
    const fileInp = document.createElement("input"); fileInp.type="file"; fileInp.id=`c${i}-file`; fileInp.accept="image/*"; fileInp.style.display="none";
    fileInp.onchange = function() {
      const file = this.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => { const img=document.createElement("img"); img.className="art-thumb"; img.id=`c${i}-art`; img.src=e.target.result; img.dataset.src=e.target.result; $(`c${i}-art`).replaceWith(img); };
      reader.readAsDataURL(file);
    };
    artRow.appendChild(fileInp); artWrap.appendChild(artRow); card.appendChild(artWrap);
    grid.appendChild(card);
  });
};

// Load from campaign
const loadSettings = async () => {
  const data = await api("/api/campaigns");
  const campaign = Array.isArray(data) ? data.find(c => c.id === CAMPAIGN_ID) : null;
  const s = campaign?.settings || {};
  $("s-world-name").value = s.worldName || "";
  $("s-world-desc").value = s.worldDesc || "";
  $("s-art-style").value  = s.artStyle  || "";
  $("s-lang").value       = s.lang      || "ru";
  $("s-chunk").value      = s.chunk     || "30";
  $("s-vad").value        = s.vad       || "10";
  buildCharCards(s.characters || Array(4).fill({name:"",race:"",appearance:"",art:""}));
};

// Save to campaign
$("btn-save").onclick = async () => {
  const settings = {
    worldName: $("s-world-name").value,
    worldDesc: $("s-world-desc").value,
    artStyle:  $("s-art-style").value,
    lang:      $("s-lang").value,
    chunk:     $("s-chunk").value,
    vad:       $("s-vad").value,
    characters: Array(4).fill(null).map((_,i) => ({
      name:       document.getElementById(`c${i}-name`)?.value||"",
      race:       document.getElementById(`c${i}-race`)?.value||"",
      appearance: document.getElementById(`c${i}-appearance`)?.value||"",
      art:        document.getElementById(`c${i}-art`)?.dataset?.src||"",
    })),
  };
  await fetch(`/api/campaigns?id=${CAMPAIGN_ID}`, {
    method: "PATCH",
    headers: { "Content-Type":"application/json", "Authorization": `Bearer ${TOKEN}` },
    body: JSON.stringify({ settings }),
  });
  const st = $("save-status"); st.style.opacity=1;
  setTimeout(() => { st.style.opacity=0; }, 2500);
};

loadSettings();
</script>
</body>
</html>
