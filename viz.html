<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>DreamStory — Визуализация</title>
<link rel="stylesheet" href="/theme.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; transition: background .2s, color .2s; }
.nav { display:flex; align-items:center; background:var(--bg2); border-bottom:1px solid var(--border); padding:0 1.5rem; height:46px; flex-shrink:0; gap:1rem; }
.nav-brand { font-size:12px; letter-spacing:.18em; color:var(--accent); flex-shrink:0; }
.nav-session { font-size:11px; color:var(--faint); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.nav-links { display:flex; align-items:center; gap:.25rem; flex-shrink:0; }
.nav-link { font-family:monospace; font-size:10px; letter-spacing:.08em; color:var(--dim); text-decoration:none; padding:.3rem .7rem; border:1px solid transparent; border-radius:3px; transition:all .2s; white-space:nowrap; }
.nav-link:hover { color:var(--text); border-color:var(--border); }
.nav-link.active { color:var(--accent); border-color:rgba(74,175,114,.3); }
.theme-toggle { background:none; border:1px solid var(--border); border-radius:3px; padding:.3rem .6rem; cursor:pointer; font-size:13px; color:var(--dim); transition:all .2s; margin-left:.25rem; }
.theme-toggle:hover { border-color:var(--accent); color:var(--accent); }
.status-bar { display:flex; align-items:center; padding:.4rem 1.5rem; background:var(--bg2); border-bottom:1px solid var(--border2); flex-shrink:0; }
.status { font-size:11px; color:var(--dim); flex:1; }
.status.live { color:var(--accent); }
.status.busy { color:#f0c040; animation:pulse 1s ease-in-out infinite; }
.status.err  { color:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.stage { flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-height:0; padding:1.5rem; }
.main-wrap { position:relative; width:100%; max-width:860px; aspect-ratio:16/9; }
.main-img { width:100%; height:100%; object-fit:cover; border-radius:6px; display:block; opacity:0; transition:opacity .8s ease; }
.main-img.visible { opacity:1; }
.main-overlay { position:absolute; bottom:0; left:0; right:0; padding:2rem 1.5rem 1.25rem; background:linear-gradient(transparent,rgba(0,0,0,.85)); border-radius:0 0 6px 6px; opacity:0; transition:opacity .8s ease; }
.main-overlay.visible { opacity:1; }
.main-event { font-size:15px; color:#e8d9b8; line-height:1.5; margin-bottom:.4rem; }
.main-meta { display:flex; align-items:center; gap:.75rem; }
.main-type { font-size:10px; letter-spacing:.1em; padding:.15rem .5rem; border-radius:2px; border:1px solid; }
.main-type.combat    { color:#e85d4a; border-color:#e85d4a40; background:#e85d4a15; }
.main-type.dialogue  { color:#4a9eed; border-color:#4a9eed40; background:#4a9eed15; }
.main-type.discovery { color:#f5c842; border-color:#f5c84240; background:#f5c84215; }
.main-type.travel    { color:#5dba7f; border-color:#5dba7f40; background:#5dba7f15; }
.main-type.magic     { color:#c084f0; border-color:#c084f040; background:#c084f015; }
.main-type.plot      { color:#f0884a; border-color:#f0884a40; background:#f0884a15; }
.main-type.other     { color:#888; border-color:#33333380; background:transparent; }
.main-chars { font-size:11px; color:#8a7a5e; }
.main-time  { font-size:10px; color:var(--faint); margin-left:auto; }
.placeholder { width:100%; height:100%; border:1px dashed var(--border); border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.75rem; }
.placeholder-icon { font-size:2rem; color:var(--border); }
.placeholder-text { font-size:11px; letter-spacing:.1em; color:var(--faint); text-align:center; line-height:1.8; }
.spinner { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; display:none; }
.spinner.on { display:block; }
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
.gallery-bar { flex-shrink:0; padding:.75rem 1.5rem; border-top:1px solid var(--border2); background:var(--bg2); }
.gallery-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.6rem; }
.gallery-title { font-size:10px; letter-spacing:.12em; color:var(--faint); }
.gallery-scroll { display:flex; gap:.5rem; overflow-x:auto; padding-bottom:.25rem; }
.gallery-scroll::-webkit-scrollbar { height:3px; }
.gallery-scroll::-webkit-scrollbar-track { background:var(--input-bg); }
.gallery-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.gallery-thumb { flex-shrink:0; width:96px; height:54px; border-radius:3px; object-fit:cover; cursor:pointer; opacity:.5; border:1px solid transparent; transition:opacity .2s,border-color .2s; }
.gallery-thumb:hover { opacity:.85; }
.gallery-thumb.active { opacity:1; border-color:rgba(74,175,114,.5); }
.gallery-empty { font-size:11px; color:var(--faint); font-style:italic; padding:.5rem 0; }
.btn-clear { font-family:monospace; font-size:10px; padding:.25rem .6rem; border:1px solid var(--border); background:transparent; color:var(--faint); cursor:pointer; border-radius:3px; transition:all .2s; }
.btn-clear:hover { color:var(--red); border-color:rgba(192,80,64,.4); }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">✦ DREAMSTORY</span>
  <span class="nav-session" id="session-name"></span>
  <div class="nav-links">
    <a class="nav-link" href="/">← Кампании</a>
    <a class="nav-link" href="/campaign.html">Сессии</a>
    <a class="nav-link" id="nav-record" href="/record.html">Запись</a>
    <a class="nav-link active" href="#">Визуализация</a>
    <button class="theme-toggle" id="theme-btn">☀</button>
  </div>
</nav>

<div class="status-bar">
  <span class="status" id="status">Ожидаю события...</span>
</div>

<div class="stage">
  <div class="main-wrap" id="main-wrap">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">✦</div>
      <div class="placeholder-text">Открой страницу записи и начни сессию<br>Картинки будут появляться здесь автоматически</div>
    </div>
    <img class="main-img" id="main-img" src="" alt="" />
    <div class="main-overlay" id="main-overlay">
      <div class="main-event" id="main-event"></div>
      <div class="main-meta">
        <span class="main-type" id="main-type"></span>
        <span class="main-chars" id="main-chars"></span>
        <span class="main-time" id="main-time"></span>
      </div>
    </div>
    <div class="spinner" id="spinner"></div>
  </div>
</div>

<div class="gallery-bar">
  <div class="gallery-header">
    <span class="gallery-title">ГАЛЕРЕЯ СЕССИИ</span>
    <button class="btn-clear" id="btn-clear">Очистить</button>
  </div>
  <div class="gallery-scroll" id="gallery">
    <div class="gallery-empty" id="gallery-empty">Изображений пока нет</div>
  </div>
</div>

<script>
// ── Theme ─────────────────────────────────────
document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
const _tb = document.getElementById("theme-btn");
_tb.textContent = (localStorage.getItem("theme")||"dark") === "dark" ? "☀" : "☾";
_tb.onclick = () => {
  const t = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("theme", t);
  _tb.textContent = t === "dark" ? "☀" : "☾";
};

const $ = id => document.getElementById(id);

const urlParams = new URLSearchParams(window.location.search);
const SESSION_ID    = urlParams.get("session") || localStorage.getItem("active-session-id");
const SESSION_TOKEN = localStorage.getItem("sb-token");
const SESSION_NAME  = localStorage.getItem("active-session-name") || "Сессия";

$("session-name").textContent = SESSION_NAME;
if (SESSION_ID) $("nav-record").href = `/record.html`;

const getKey = () => localStorage.getItem("openai-key") || "";

const gallery = [];
let activeIndex = -1;

const saveToSupabase = async (url, eventData) => {
  if (!SESSION_ID || !SESSION_TOKEN) return;
  const b64 = url.startsWith("data:image") ? url.split(",")[1] : null;
  if (!b64) return;
  try {
    await fetch("/api/events", {
      method: "POST",
      headers: { "Content-Type":"application/json", "Authorization":`Bearer ${SESSION_TOKEN}` },
      body: JSON.stringify({
        session_id: SESSION_ID,
        type: eventData.type,
        description: eventData.event,
        characters: eventData.characters || [],
        image_prompt: eventData.image_prompt || "",
        image_b64: b64,
      }),
    });
  } catch(e) { console.error("Save error:", e); }
};

let db;
const DB_NAME = "dnd-gallery", DB_VER = 1, STORE = "images";
const initDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open(DB_NAME, DB_VER);
  req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
  req.onsuccess = e => { db = e.target.result; resolve(); };
  req.onerror = reject;
});
const saveImageToDB = (item) => { if (!db) return; db.transaction(STORE, "readwrite").objectStore(STORE).add(item); };
const loadImagesFromDB = () => new Promise(resolve => {
  if (!db) return resolve([]);
  const req = db.transaction(STORE, "readonly").objectStore(STORE).getAll();
  req.onsuccess = e => resolve(e.target.result || []);
  req.onerror = () => resolve([]);
});
const clearDB = () => new Promise(resolve => {
  if (!db) return resolve();
  const tx = db.transaction(STORE, "readwrite");
  tx.objectStore(STORE).clear();
  tx.oncomplete = resolve;
});

const setStatus = (msg, cls = "") => {
  const el = $("status");
  el.textContent = msg;
  el.className = "status" + (cls ? " " + cls : "");
};

const showImage = (idx) => {
  if (idx < 0 || idx >= gallery.length) return;
  const item = gallery[idx];
  activeIndex = idx;
  const img = $("main-img");
  img.classList.remove("visible");
  $("main-overlay").classList.remove("visible");
  $("placeholder").style.display = "none";
  setTimeout(() => {
    img.src = item.url;
    img.onload = () => { img.classList.add("visible"); $("main-overlay").classList.add("visible"); };
  }, 100);
  $("main-event").textContent = item.event || "";
  const typeEl = $("main-type");
  typeEl.textContent = (item.type || "other").toUpperCase();
  typeEl.className = "main-type " + (item.type || "other");
  $("main-chars").textContent = (item.characters || []).join(", ");
  $("main-time").textContent = item.time || "";
  document.querySelectorAll(".gallery-thumb").forEach((t, i) => {
    t.classList.toggle("active", i === (gallery.length - 1 - idx));
  });
};

const addThumbToGallery = (item, idx) => {
  const i = idx !== undefined ? idx : gallery.length - 1;
  const emptyEl = $("gallery-empty"); if (emptyEl) emptyEl.remove();
  const thumb = document.createElement("img");
  thumb.className = "gallery-thumb"; thumb.src = item.url; thumb.title = item.event;
  thumb.onclick = () => showImage(i);
  $("gallery").insertBefore(thumb, $("gallery").firstChild);
};

const addToGallery = (url, eventData) => {
  const item = {
    url,
    event: eventData.event || "",
    type: eventData.type || "other",
    characters: eventData.characters || [],
    time: new Date().toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" }),
  };
  gallery.push(item);
  saveImageToDB(item);
  addThumbToGallery(item, gallery.length - 1);
  showImage(gallery.length - 1);
};

const generateImage = async (eventData, charArts = []) => {
  const key = getKey();
  if (!key) { setStatus("OpenAI ключ не найден — введи на странице Записи", "err"); return; }
  setStatus("Генерирую изображение...", "busy");
  $("spinner").classList.add("on");
  try {
    let res;
    const relevantArts = charArts.filter(ca =>
      (eventData.characters || []).some(c => c.toLowerCase().includes(ca.name.toLowerCase()))
    );
    if (relevantArts.length > 0) {
      const form = new FormData();
      form.append("prompt", eventData.image_prompt);
      for (const ca of relevantArts) {
        const resp = await fetch(ca.art);
        const blob = await resp.blob();
        form.append("image", blob, `${ca.name}.png`);
      }
      res = await fetch("/api/image", { method:"POST", headers:{"x-openai-key":key}, body:form });
    } else {
      res = await fetch("/api/image", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-openai-key":key},
        body:JSON.stringify({ prompt: eventData.image_prompt }),
      });
    }
    const data = await res.json();
    $("spinner").classList.remove("on");
    if (!res.ok) { setStatus(`Ошибка: ${data.error?.message || "unknown"}`, "err"); return; }
    const itm = data.data?.[0];
    if (!itm) { setStatus("Нет данных в ответе", "err"); return; }
    const url = itm.url || (itm.b64_json ? `data:image/png;base64,${itm.b64_json}` : null);
    if (!url) { setStatus("Нет изображения в ответе", "err"); return; }
    addToGallery(url, eventData);
    setStatus(`✦ ${(eventData.type||"событие").toUpperCase()} — ${new Date().toLocaleTimeString("ru")}`, "live");
    await saveToSupabase(url, eventData);
  } catch(e) {
    $("spinner").classList.remove("on");
    setStatus("Ошибка: " + e.message, "err");
  }
};

const bc = new BroadcastChannel("dnd-narrative");
bc.onmessage = (e) => {
  if (e.data?.type === "event" && e.data.event?.generate_image) {
    setStatus(`Новое событие: ${e.data.event.event}`, "busy");
    generateImage(e.data.event, e.data.charArts || []);
  }
};

const loadServerGallery = async () => {
  if (!SESSION_ID || !SESSION_TOKEN) {
    initDB().then(() => loadImagesFromDB().then(items => {
      if (items.length > 0) {
        items.forEach(item => { gallery.push(item); addThumbToGallery(item, gallery.length-1); });
        showImage(gallery.length - 1);
        setTimeout(() => setStatus("Слушаю основную вкладку...", ""), 2000);
      } else {
        setStatus("Слушаю основную вкладку...", "");
      }
    }));
    return;
  }
  setStatus("Загружаю историю сессии...", "busy");
  try {
    const res = await fetch(`/api/events?session_id=${SESSION_ID}`, {
      headers: { "Authorization": `Bearer ${SESSION_TOKEN}` }
    });
    const events = await res.json();
    if (Array.isArray(events) && events.length > 0) {
      events.filter(ev => ev.image_url).forEach(ev => {
        const item = {
          url: ev.image_url,
          event: ev.description || "",
          type: ev.type || "other",
          characters: ev.characters || [],
          time: new Date(ev.created_at).toLocaleTimeString("ru", {hour:"2-digit",minute:"2-digit"}),
        };
        gallery.push(item);
        addThumbToGallery(item, gallery.length - 1);
      });
      if (gallery.length > 0) {
        showImage(gallery.length - 1);
        setStatus(`Загружено ${gallery.length} изображений`, "live");
        setTimeout(() => setStatus("Слушаю основную вкладку...", ""), 2000);
        return;
      }
    }
  } catch(e) { console.error("Load error:", e); }
  setStatus("Слушаю основную вкладку...", "");
};

$("btn-clear").onclick = () => {
  if (!confirm("Очистить галерею?")) return;
  clearDB().then(() => {
    gallery.length = 0;
    $("gallery").innerHTML = '<div class="gallery-empty" id="gallery-empty">Изображений пока нет</div>';
    $("main-img").classList.remove("visible");
    $("main-overlay").classList.remove("visible");
    $("placeholder").style.display = "";
    setStatus("Галерея очищена", "");
  });
};

loadServerGallery();
</script>
</body>
</html>
