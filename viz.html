<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DnD — Визуализация</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: monospace;
  background: #080808;
  color: #c9c9c9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  height: 44px;
  background: #0d0d0d;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
  gap: 1rem;
}
.topbar-brand { font-size: 11px; letter-spacing: .18em; color: #333; flex-shrink: 0; }
.topbar-status { font-size: 11px; color: #444; flex: 1; }
.topbar-status.live { color: #4caf72; }
.topbar-status.busy { color: #f0c040; animation: pulse 1s ease-in-out infinite; }
.topbar-status.err  { color: #c05040; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.key-row { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
.key-inp {
  background: #111; border: 1px solid #1e1e1e; border-radius: 3px;
  padding: .3rem .6rem; color: #888; font-family: monospace; font-size: 11px;
  outline: none; width: 200px; transition: border-color .2s;
}
.key-inp:focus { border-color: #4a8fcc; }
.key-lbl { font-size: 10px; color: #333; letter-spacing: .08em; flex-shrink: 0; }

/* ── Main stage ── */
.stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  min-height: 0;
  padding: 1.5rem;
}

.main-wrap {
  position: relative;
  width: 100%;
  max-width: 860px;
  aspect-ratio: 16/9;
}

.main-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
  display: block;
  opacity: 0;
  transition: opacity .8s ease;
}
.main-img.visible { opacity: 1; }

.main-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 2rem 1.5rem 1.25rem;
  background: linear-gradient(transparent, rgba(0,0,0,.85));
  border-radius: 0 0 6px 6px;
  opacity: 0;
  transition: opacity .8s ease;
}
.main-overlay.visible { opacity: 1; }

.main-event { font-size: 15px; color: #e8d9b8; line-height: 1.5; margin-bottom: .4rem; }
.main-meta { display: flex; align-items: center; gap: .75rem; }
.main-type {
  font-size: 10px; letter-spacing: .1em; padding: .15rem .5rem;
  border-radius: 2px; border: 1px solid;
}
.main-type.combat    { color: #e85d4a; border-color: #e85d4a40; background: #e85d4a15; }
.main-type.dialogue  { color: #4a9eed; border-color: #4a9eed40; background: #4a9eed15; }
.main-type.discovery { color: #f5c842; border-color: #f5c84240; background: #f5c84215; }
.main-type.travel    { color: #5dba7f; border-color: #5dba7f40; background: #5dba7f15; }
.main-type.magic     { color: #c084f0; border-color: #c084f040; background: #c084f015; }
.main-type.plot      { color: #f0884a; border-color: #f0884a40; background: #f0884a15; }
.main-type.other     { color: #888; border-color: #33333380; background: #1a1a1a; }
.main-chars { font-size: 11px; color: #8a7a5e; }
.main-time  { font-size: 10px; color: #444; margin-left: auto; }

.placeholder {
  width: 100%;
  height: 100%;
  border: 1px dashed #1e1e1e;
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: .75rem;
}
.placeholder-icon { font-size: 2rem; color: #1e1e1e; }
.placeholder-text { font-size: 11px; letter-spacing: .1em; color: #2a2a2a; text-align: center; line-height: 1.8; }

.spinner {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 40px; height: 40px;
  border: 2px solid #1e1e1e;
  border-top-color: #4caf72;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  display: none;
}
.spinner.on { display: block; }
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

/* ── Gallery ── */
.gallery-bar {
  flex-shrink: 0;
  padding: .75rem 1.5rem;
  border-top: 1px solid #141414;
  background: #0a0a0a;
}
.gallery-title { font-size: 10px; letter-spacing: .12em; color: #2a2a2a; margin-bottom: .6rem; }
.gallery-scroll {
  display: flex;
  gap: .5rem;
  overflow-x: auto;
  padding-bottom: .25rem;
}
.gallery-scroll::-webkit-scrollbar { height: 3px; }
.gallery-scroll::-webkit-scrollbar-track { background: #111; }
.gallery-scroll::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

.gallery-thumb {
  flex-shrink: 0;
  width: 96px;
  height: 54px;
  border-radius: 3px;
  object-fit: cover;
  cursor: pointer;
  opacity: .5;
  border: 1px solid transparent;
  transition: opacity .2s, border-color .2s;
}
.gallery-thumb:hover { opacity: .85; }
.gallery-thumb.active { opacity: 1; border-color: #4caf7260; }

.gallery-empty { font-size: 11px; color: #222; font-style: italic; padding: .5rem 0; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">// DND VIZ</span>
  <span class="topbar-status" id="status">Ожидаю события из основной вкладки...</span>
  <div class="key-row">
    <span class="key-lbl">OPENAI KEY</span>
    <input type="password" class="key-inp" id="openai-key" placeholder="sk-..." />
  </div>
</div>

<div class="stage">
  <div class="main-wrap" id="main-wrap">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">✦</div>
      <div class="placeholder-text">Открой основную вкладку и начни запись<br>Картинки будут появляться здесь автоматически</div>
    </div>
    <img class="main-img" id="main-img" src="" alt="" />
    <div class="main-overlay" id="main-overlay">
      <div class="main-event" id="main-event"></div>
      <div class="main-meta">
        <span class="main-type" id="main-type"></span>
        <span class="main-chars" id="main-chars"></span>
        <span class="main-time" id="main-time"></span>
      </div>
    </div>
    <div class="spinner" id="spinner"></div>
  </div>
</div>

<div class="gallery-bar">
  <div class="gallery-title">ГАЛЕРЕЯ СЕССИИ</div>
  <div class="gallery-scroll" id="gallery">
    <div class="gallery-empty" id="gallery-empty">Изображений пока нет</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// Persist key
const savedKey = localStorage.getItem("openai-key");
if (savedKey) $("openai-key").value = savedKey;
$("openai-key").addEventListener("input", e => localStorage.setItem("openai-key", e.target.value.trim()));

// Gallery state
const gallery = []; // { url, event, type, characters, time }
let activeIndex = -1;

const setStatus = (msg, cls = "") => {
  const el = $("status");
  el.textContent = msg;
  el.className = "topbar-status" + (cls ? " " + cls : "");
};

const showImage = (idx) => {
  if (idx < 0 || idx >= gallery.length) return;
  const item = gallery[idx];
  activeIndex = idx;

  // Update main image
  const img = $("main-img");
  img.classList.remove("visible");
  $("main-overlay").classList.remove("visible");
  $("placeholder").style.display = "none";

  setTimeout(() => {
    img.src = item.url;
    img.onload = () => {
      img.classList.add("visible");
      $("main-overlay").classList.add("visible");
    };
  }, 100);

  // Update overlay text
  $("main-event").textContent = item.event || "";
  const typeEl = $("main-type");
  typeEl.textContent = (item.type || "other").toUpperCase();
  typeEl.className = "main-type " + (item.type || "other");
  $("main-chars").textContent = (item.characters || []).join(", ");
  $("main-time").textContent = item.time || "";

  // Update gallery active state
  document.querySelectorAll(".gallery-thumb").forEach((t, i) => {
    t.classList.toggle("active", i === (gallery.length - 1 - idx));
  });
};

const addToGallery = (url, eventData) => {
  const item = {
    url,
    event: eventData.event || "",
    type: eventData.type || "other",
    characters: eventData.characters || [],
    time: new Date().toLocaleTimeString("ru", { hour: "2-digit", minute: "2-digit" }),
  };

  gallery.push(item);

  // Add thumb at start of gallery scroll
  const emptyEl = $("gallery-empty");
  if (emptyEl) emptyEl.remove();

  const thumb = document.createElement("img");
  thumb.className = "gallery-thumb";
  thumb.src = url;
  thumb.title = item.event;
  const idx = gallery.length - 1;
  thumb.onclick = () => showImage(idx);
  $("gallery").insertBefore(thumb, $("gallery").firstChild);

  // Show as main
  showImage(idx);
};

const generateImage = async (eventData) => {
  const key = $("openai-key").value.trim();
  if (!key) { setStatus("Введи OpenAI ключ", "err"); return; }

  setStatus("Генерирую изображение...", "busy");
  $("spinner").classList.add("on");

  try {
    const res = await fetch("/api/image", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-openai-key": key },
      body: JSON.stringify({
        model: "dall-e-3",
        prompt: eventData.image_prompt,
        n: 1,
        size: "1792x1024",
        quality: "standard",
      }),
    });

    const data = await res.json();
    $("spinner").classList.remove("on");

    if (!res.ok) {
      setStatus(`Ошибка DALL-E: ${data.error?.message || "unknown"}`, "err");
      return;
    }

    const url = data.data?.[0]?.url;
    if (!url) { setStatus("Нет URL в ответе", "err"); return; }

    addToGallery(url, eventData);
    setStatus(`✦ ${(eventData.type||"событие").toUpperCase()} — ${new Date().toLocaleTimeString("ru")}`, "live");
  } catch(e) {
    $("spinner").classList.remove("on");
    setStatus("Ошибка: " + e.message, "err");
  }
};

// Listen for events from main tab
const bc = new BroadcastChannel("dnd-narrative");
bc.onmessage = (e) => {
  if (e.data?.type === "event" && e.data.event?.generate_image) {
    setStatus(`Новое событие: ${e.data.event.event}`, "busy");
    generateImage(e.data.event);
  }
};

setStatus("Слушаю основную вкладку...", "");
</script>
</body>
</html>
