<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DreamStory — Сессии</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #0d0d0d; color: #c9c9c9; min-height: 100vh; }
.nav { display:flex; align-items:center; justify-content:space-between; background:#111; border-bottom:1px solid #1e1e1e; padding:0 1.5rem; height:46px; }
.nav-brand { font-size:12px; letter-spacing:.18em; color:#4caf72; }
.nav-user { font-size:11px; color:#444; display:flex; align-items:center; gap:1rem; }
.page { padding:2rem 1.5rem; max-width:680px; margin:0 auto; }

/* Auth */
.auth-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; gap:1.5rem; }
.auth-title { font-size:14px; letter-spacing:.15em; color:#555; }
.auth-box { background:#181818; border:1px solid #2a2a2a; border-radius:6px; padding:2rem; width:100%; max-width:360px; display:flex; flex-direction:column; gap:1rem; }
.auth-label { font-size:10px; letter-spacing:.1em; color:#555; display:block; margin-bottom:.35rem; }
.auth-inp { width:100%; background:#111; border:1px solid #222; border-radius:3px; padding:.55rem .75rem; color:#ccc; font-family:monospace; font-size:13px; outline:none; transition:border-color .2s; }
.auth-inp:focus { border-color:#4caf72; }
.auth-btn { width:100%; font-family:monospace; font-size:11px; letter-spacing:.1em; padding:.65rem; border:1px solid #4caf7260; background:transparent; color:#4caf72; cursor:pointer; border-radius:3px; transition:all .2s; }
.auth-btn:hover { background:#4caf7215; }
.auth-msg { font-size:12px; color:#555; text-align:center; min-height:18px; }
.auth-msg.ok { color:#4caf72; }
.auth-msg.err { color:#c05040; }

/* Sessions */
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
.page-title { font-size:11px; letter-spacing:.15em; color:#444; }
.btn { font-family:monospace; font-size:11px; letter-spacing:.1em; padding:.45rem 1rem; border:1px solid #333; background:transparent; color:#777; cursor:pointer; border-radius:3px; transition:all .2s; }
.btn:hover { border-color:#4caf72; color:#4caf72; }
.btn.primary { border-color:#4caf7260; color:#4caf72; }
.btn.primary:hover { background:#4caf7215; }
.btn.danger { border-color:#c0504040; color:#c05040; font-size:10px; padding:.3rem .6rem; }
.btn.danger:hover { background:#c0504015; }

.session-list { display:flex; flex-direction:column; gap:.6rem; }
.session-card { background:#181818; border:1px solid #2a2a2a; border-radius:6px; padding:1rem 1.25rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; transition:border-color .2s; cursor:pointer; }
.session-card:hover { border-color:#4caf7240; }
.session-info { flex:1; min-width:0; }
.session-name { font-size:14px; color:#ccc; margin-bottom:.25rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.session-meta { font-size:11px; color:#444; }
.session-actions { display:flex; gap:.5rem; flex-shrink:0; }
.empty-state { text-align:center; padding:4rem 2rem; font-size:12px; color:#333; letter-spacing:.05em; }

/* New session modal */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:100; display:none; }
.modal-bg.open { display:flex; }
.modal { background:#181818; border:1px solid #2a2a2a; border-radius:6px; padding:1.75rem; width:100%; max-width:380px; display:flex; flex-direction:column; gap:1rem; }
.modal-title { font-size:11px; letter-spacing:.12em; color:#555; }
.modal-inp { width:100%; background:#111; border:1px solid #222; border-radius:3px; padding:.5rem .75rem; color:#ccc; font-family:monospace; font-size:13px; outline:none; transition:border-color .2s; }
.modal-inp:focus { border-color:#4caf72; }
.modal-row { display:flex; gap:.75rem; }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">✦ DREAMSTORY</span>
  <div class="nav-user">
    <span id="nav-email"></span>
    <button class="btn" id="btn-logout" style="display:none;font-size:10px;padding:.3rem .6rem;">Выйти</button>
  </div>
</nav>

<!-- Auth -->
<div class="auth-wrap" id="auth-wrap">
  <span class="auth-title">// ВХОД В СИСТЕМУ</span>
  <div class="auth-box">
    <div>
      <label class="auth-label">EMAIL</label>
      <input class="auth-inp" type="email" id="auth-email" placeholder="your@email.com" />
    </div>
    <button class="auth-btn" id="auth-btn">Отправить Magic Link</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- Sessions -->
<div class="page" id="sessions-page" style="display:none;">
  <div class="page-header">
    <span class="page-title">МОИ СЕССИИ</span>
    <button class="btn primary" id="btn-new">+ Новая сессия</button>
  </div>
  <div class="session-list" id="session-list">
    <div class="empty-state">Загрузка...</div>
  </div>
</div>

<!-- New session modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <span class="modal-title">НОВАЯ СЕССИЯ</span>
    <input class="modal-inp" type="text" id="new-session-name" placeholder="Название сессии..." />
    <div class="modal-row">
      <button class="btn primary" id="modal-create" style="flex:1;">Создать</button>
      <button class="btn" id="modal-cancel">Отмена</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://mbysjfsuqeqjcedgfdmb.supabase.co";
const SUPABASE_KEY = "sb_publishable_V-Ug9nyp6XPVBIJ3tr3qww_VjwGLg6Z";

const $ = id => document.getElementById(id);
let token = null;

// Simple Supabase auth via fetch
const sbFetch = (path, opts = {}) => fetch(`${SUPABASE_URL}${path}`, {
  ...opts,
  headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${token || SUPABASE_KEY}`, ...(opts.headers || {}) },
});

const api = (path, opts = {}) => fetch(path, {
  ...opts,
  headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}`, ...(opts.headers || {}) },
}).then(r => r.json());

// Check existing session
const checkSession = async () => {
  const stored = localStorage.getItem("sb-token");
  if (!stored) return showAuth();
  token = stored;
  // Verify token
  const res = await sbFetch("/auth/v1/user");
  if (!res.ok) { localStorage.removeItem("sb-token"); return showAuth(); }
  const user = await res.json();
  showSessions(user);
};

const showAuth = () => {
  $("auth-wrap").style.display = "flex";
  $("sessions-page").style.display = "none";
};

const showSessions = async (user) => {
  $("auth-wrap").style.display = "none";
  $("sessions-page").style.display = "block";
  $("nav-email").textContent = user.email;
  $("btn-logout").style.display = "block";
  loadSessions();
};

// Auth
$("auth-btn").onclick = async () => {
  const email = $("auth-email").value.trim();
  if (!email) return;
  $("auth-btn").disabled = true;
  $("auth-msg").textContent = "Отправляю...";
  $("auth-msg").className = "auth-msg";
  const res = await sbFetch("/auth/v1/magiclink", {
    method: "POST",
    body: JSON.stringify({ email }),
  });
  $("auth-btn").disabled = false;
  if (res.ok) {
    $("auth-msg").textContent = "Ссылка отправлена на почту ✓";
    $("auth-msg").className = "auth-msg ok";
  } else {
    $("auth-msg").textContent = "Ошибка, попробуй снова";
    $("auth-msg").className = "auth-msg err";
  }
};

$("btn-logout").onclick = () => {
  localStorage.removeItem("sb-token");
  token = null;
  showAuth();
};

// Handle magic link token in URL
const hash = new URLSearchParams(window.location.hash.replace("#", ""));
const accessToken = hash.get("access_token");
if (accessToken) {
  token = accessToken;
  localStorage.setItem("sb-token", token);
  window.history.replaceState({}, "", "/");
  sbFetch("/auth/v1/user").then(r => r.json()).then(showSessions);
} else {
  checkSession();
}

// Sessions
const loadSessions = async () => {
  const data = await api("/api/sessions");
  const list = $("session-list");
  if (!Array.isArray(data) || data.length === 0) {
    list.innerHTML = '<div class="empty-state">Нет сессий. Создай первую!</div>';
    return;
  }
  list.innerHTML = "";
  data.forEach(s => {
    const card = document.createElement("div");
    card.className = "session-card";
    const d = new Date(s.created_at);
    card.innerHTML = `
      <div class="session-info">
        <div class="session-name">${s.name}</div>
        <div class="session-meta">${d.toLocaleDateString("ru")} · ${d.toLocaleTimeString("ru", {hour:"2-digit",minute:"2-digit"})}</div>
      </div>
      <div class="session-actions">
        <button class="btn primary" onclick="openSession('${s.id}', '${s.name}')">Открыть</button>
        <button class="btn danger" onclick="deleteSession(event, '${s.id}')">×</button>
      </div>
    `;
    list.appendChild(card);
  });
};

const openSession = (id, name) => {
  localStorage.setItem("active-session-id", id);
  localStorage.setItem("active-session-name", name);
  window.location.href = `/record.html`;
};

const deleteSession = async (e, id) => {
  e.stopPropagation();
  if (!confirm("Удалить сессию и все её данные?")) return;
  await api(`/api/sessions?id=${id}`, { method: "DELETE" });
  loadSessions();
};

// New session modal
$("btn-new").onclick = () => { $("modal").classList.add("open"); $("new-session-name").focus(); };
$("modal-cancel").onclick = () => $("modal").classList.remove("open");
$("modal-create").onclick = async () => {
  const name = $("new-session-name").value.trim() || "Новая сессия";
  const data = await api("/api/sessions", { method: "POST", body: JSON.stringify({ name }) });
  $("modal").classList.remove("open");
  $("new-session-name").value = "";
  if (data.id) openSession(data.id, data.name);
};
$("new-session-name").onkeydown = e => { if (e.key === "Enter") $("modal-create").click(); };
</script>
</body>
</html>
