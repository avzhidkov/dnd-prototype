<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DnD Narrative Prototype</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #0d0d0d; color: #c9c9c9; min-height: 100vh; }
.nav { display:flex; align-items:center; background:#111; border-bottom:1px solid #1e1e1e; padding:0 1.5rem; height:46px; position:sticky; top:0; z-index:10; }
.nav-brand { font-size:11px; letter-spacing:.18em; color:#444; margin-right:2rem; flex-shrink:0; }
.nav-tab { background:none; border:none; border-bottom:2px solid transparent; height:46px; padding:0 1rem; font-family:monospace; font-size:11px; letter-spacing:.1em; color:#555; cursor:pointer; transition:all .2s; }
.nav-tab:hover { color:#999; }
.nav-tab.active { color:#c9c9c9; border-bottom-color:#4caf72; }
.page { display:none; padding:1.75rem 1.5rem; max-width:780px; margin:0 auto; }
.page.active { display:block; }
.box { background:#181818; border:1px solid #2a2a2a; border-radius:6px; padding:1.25rem 1.5rem; margin-bottom:1rem; }
.box-title { font-size:10px; letter-spacing:.12em; color:#444; margin-bottom:1rem; padding-bottom:.6rem; border-bottom:1px solid #1e1e1e; }
.row { display:flex; align-items:center; gap:.75rem; margin-bottom:.6rem; }
.row:last-child { margin-bottom:0; }
label { font-size:12px; color:#666; flex-shrink:0; min-width:90px; }
input[type=text], input[type=password] { flex:1; background:#111; border:1px solid #222; border-radius:3px; padding:.45rem .75rem; color:#ccc; font-family:monospace; font-size:12px; outline:none; transition:border-color .2s; }
input:focus { border-color:#4a8fcc; }
textarea { width:100%; background:#111; border:1px solid #222; border-radius:3px; padding:.6rem .75rem; color:#ccc; font-family:monospace; font-size:12px; outline:none; resize:vertical; line-height:1.6; transition:border-color .2s; }
textarea:focus { border-color:#4a8fcc; }
button { font-family:monospace; font-size:11px; letter-spacing:.1em; padding:.5rem 1.1rem; border:1px solid #333; background:transparent; color:#777; cursor:pointer; border-radius:3px; transition:all .2s; }
button:hover:not(:disabled) { border-color:#4caf72; color:#4caf72; }
button:disabled { opacity:.3; cursor:default; }
button.stop { border-color:#c0504040; color:#c05040; }
button.stop:hover:not(:disabled) { background:#c0504015; }
button.save { border-color:#4a8fcc60; color:#4a8fcc; }
button.save:hover:not(:disabled) { background:#4a8fcc15; border-color:#4a8fcc; }
button.danger { border-color:#c0504060; color:#c05040; font-size:10px; padding:.3rem .7rem; }
button.danger:hover { background:#c0504015; }
.dot { width:8px; height:8px; border-radius:50%; background:#2a2a2a; transition:background .3s; flex-shrink:0; }
.dot.on { background:#4caf72; box-shadow:0 0 6px #4caf7280; }
.dot.err { background:#c05040; }
.dot.busy { background:#f0c040; animation:pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.timer { font-size:28px; font-weight:bold; color:#4caf72; text-align:center; letter-spacing:.05em; margin:.5rem 0; }
.stat-row { display:flex; justify-content:space-between; font-size:11px; color:#444; padding:.2rem 0; }
.stat-val { color:#888; }
.transcript { background:#111; border:1px solid #222; border-radius:4px; padding:1rem; min-height:100px; max-height:220px; overflow-y:auto; font-size:13px; line-height:1.85; color:#aaa; }
.chunk-block { margin-bottom:.75rem; padding-bottom:.75rem; border-bottom:1px solid #1e1e1e; }
.chunk-block:last-child { border-bottom:none; margin-bottom:0; }
.chunk-meta { font-size:10px; color:#444; margin-bottom:.3rem; }
.chunk-text { color:#bbb; }
.chunk-pending { color:#555; font-style:italic; }
.log-box { font-size:11px; color:#444; line-height:1.8; max-height:90px; overflow-y:auto; }
.log-box .ok  { color:#4caf72; display:block; }
.log-box .err { color:#c05040; display:block; }
.log-box .inf { color:#666; display:block; }
.empty { color:#333; font-style:italic; font-size:12px; }
.meter-wrap { display:flex; align-items:center; gap:.6rem; margin-bottom:.4rem; }
.meter-label { font-size:11px; color:#555; flex-shrink:0; width:80px; }
.meter-bar { flex:1; height:3px; background:#1e1e1e; border-radius:2px; overflow:hidden; }
.meter-fill { height:100%; width:0%; background:#4caf72; border-radius:2px; transition:width .08s ease-out; }
.meter-fill.mid { background:#f0c040; }
.meter-fill.hot { background:#c05040; }
.meter-val { font-size:11px; color:#444; min-width:32px; text-align:right; }

/* Events */
.events-list { display:flex; flex-direction:column; gap:.6rem; }
.event-card { background:#131313; border:1px solid #222; border-radius:4px; padding:.85rem 1rem; }
.event-card.has-image { border-color:#4caf7230; }
.event-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:.5rem; }
.event-type { font-size:10px; letter-spacing:.1em; padding:.15rem .5rem; border-radius:2px; border:1px solid; }
.event-type.combat    { color:#e85d4a; border-color:#e85d4a40; background:#e85d4a10; }
.event-type.dialogue  { color:#4a9eed; border-color:#4a9eed40; background:#4a9eed10; }
.event-type.discovery { color:#f5c842; border-color:#f5c84240; background:#f5c84210; }
.event-type.travel    { color:#5dba7f; border-color:#5dba7f40; background:#5dba7f10; }
.event-type.magic     { color:#c084f0; border-color:#c084f040; background:#c084f010; }
.event-type.plot      { color:#f0884a; border-color:#f0884a40; background:#f0884a10; }
.event-type.other     { color:#888; border-color:#33333380; background:#1a1a1a; }
.event-time { font-size:10px; color:#333; }
.event-desc { font-size:13px; color:#bbb; line-height:1.6; margin-bottom:.5rem; }
.event-chars { display:flex; flex-wrap:wrap; gap:.3rem; }
.event-char { font-size:10px; color:#555; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:2px; padding:.1rem .45rem; }
.event-prompt { font-size:10px; color:#3a5a3a; font-style:italic; margin-top:.5rem; line-height:1.5; border-top:1px solid #1e1e1e; padding-top:.5rem; }
.img-badge { font-size:10px; color:#4caf72; letter-spacing:.06em; }
.no-events { color:#333; font-style:italic; font-size:12px; text-align:center; padding:1.5rem 0; }

/* Settings */
.field-label { font-size:10px; letter-spacing:.1em; color:#555; margin-bottom:.4rem; display:block; }
.char-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
@media(max-width:600px){ .char-grid { grid-template-columns:1fr; } }
.char-card { background:#131313; border:1px solid #222; border-radius:6px; padding:1rem 1.1rem; }
.char-num { font-size:10px; letter-spacing:.1em; color:#4caf72; display:block; margin-bottom:.85rem; }
.char-field { margin-bottom:.65rem; }
.char-field:last-child { margin-bottom:0; }
.char-field label { font-size:10px; letter-spacing:.08em; color:#555; display:block; margin-bottom:.3rem; min-width:unset; }
.char-field input { width:100%; flex:unset; }
.char-field textarea { min-height:70px; }
.art-upload { display:flex; align-items:center; gap:.75rem; }
.art-thumb { width:44px; height:44px; border-radius:4px; border:1px solid #2a2a2a; background:#111; object-fit:cover; flex-shrink:0; }
.art-placeholder { width:44px; height:44px; border-radius:4px; border:1px dashed #2a2a2a; background:#111; display:flex; align-items:center; justify-content:center; font-size:16px; color:#2a2a2a; flex-shrink:0; }
.art-btn { font-size:10px; padding:.3rem .65rem; color:#555; border-color:#2a2a2a; letter-spacing:.06em; }
.art-btn:hover:not(:disabled) { color:#4a8fcc; border-color:#4a8fcc; }
.save-bar { display:flex; align-items:center; justify-content:space-between; gap:1rem; }
.save-status { font-size:11px; color:#4caf72; min-height:16px; transition:opacity .3s; }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">// DND</span>
  <button class="nav-tab active" data-page="record">ЗАПИСЬ</button>
  <button class="nav-tab" data-page="settings">НАСТРОЙКИ</button>
</nav>

<!-- ЗАПИСЬ -->
<div class="page active" id="page-record">
  <div class="box">
    <div class="box-title">КЛЮЧИ API</div>
    <div class="row"><label>OpenAI</label><input type="password" id="openai-key" placeholder="sk-..." /></div>
    
    <div class="row">
      <label>Язык</label>
      <input type="text" id="lang" value="ru" style="max-width:60px;" />
      <label style="min-width:unset;">Чанк (сек)</label>
      <input type="text" id="chunk-sec" value="30" style="max-width:60px;" />
      <label style="min-width:unset;">VAD порог</label>
      <input type="text" id="vad-threshold" value="4" style="max-width:60px;" title="Минимальный средний уровень громкости (0-100). Чанки тише — пропускаются." />
    </div>
  </div>

  <div class="box">
    <div class="box-title">СТАТУС</div>
    <div class="row"><span style="font-size:12px;color:#555;">Вкладка</span><div class="dot" id="dot-tab"></div></div>
    <div class="row"><span style="font-size:12px;color:#555;">Микрофон</span><div class="dot" id="dot-mic"></div></div>
    <div class="meter-wrap"><span class="meter-label">mic level</span><div class="meter-bar"><div class="meter-fill" id="meter-mic"></div></div><span class="meter-val" id="meter-mic-val">—</span></div>
    <div class="meter-wrap"><span class="meter-label">tab level</span><div class="meter-bar"><div class="meter-fill" id="meter-tab"></div></div><span class="meter-val" id="meter-tab-val">—</span></div>
    <div class="row"><span style="font-size:12px;color:#555;">Запись</span><div class="dot" id="dot-rec"></div></div>
    <div class="row"><span style="font-size:12px;color:#555;">Whisper</span><div class="dot" id="dot-wh"></div></div>
    <div class="row"><span style="font-size:12px;color:#555;">GPT-4o</span><div class="dot" id="dot-claude"></div></div>
    <div class="timer" id="timer">00:00</div>
    <div class="row" style="justify-content:center;gap:1rem;">
      <button id="btn-start">▶ СТАРТ</button>
      <button id="btn-stop" class="stop" disabled>■ СТОП</button>
    </div>
  </div>

  <div class="box">
    <div class="box-title">СТАТИСТИКА</div>
    <div class="stat-row"><span>Чанков / событий</span><span class="stat-val"><span id="s-chunks">0</span> / <span id="s-events">0</span></span></div>
    <div class="stat-row"><span>Минут аудио</span><span class="stat-val" id="s-mins">0.0</span></div>
    <div class="stat-row"><span>Стоимость Whisper</span><span class="stat-val" id="s-cost-w">$0.000</span></div>
    <div class="stat-row"><span>Стоимость Claude (est.)</span><span class="stat-val" id="s-cost-c">$0.000</span></div>
  </div>

  <div class="box">
    <div class="box-title">ТРАНСКРИПТ</div>
    <div class="transcript" id="transcript"><span class="empty">Здесь появится текст...</span></div>
  </div>

  <div class="box">
    <div class="box-title">СОБЫТИЯ <span id="events-count" style="color:#333;font-size:10px;"></span></div>
    <div class="events-list" id="events-list"><div class="no-events">Событий пока нет...</div></div>
  </div>

  <div class="box">
    <div class="box-title">ЛОГ</div>
    <div class="log-box" id="log"></div>
  </div>
</div>

<!-- НАСТРОЙКИ -->
<div class="page" id="page-settings">
  <div class="box">
    <div class="box-title">МИР И СЕТТИНГ</div>
    <div class="char-field">
      <label class="field-label">НАЗВАНИЕ МИРА / КАМПАНИИ</label>
      <input type="text" id="s-world-name" placeholder="Forgotten Realms, Curse of Strahd..." />
    </div>
    <div class="char-field" style="margin-top:.75rem;">
      <label class="field-label">ОПИСАНИЕ СЕТТИНГА — подаётся в каждый запрос к Claude и image prompt</label>
      <textarea id="s-world-desc" rows="4" placeholder="Тёмное фэнтези, средневековье. Мир на грани коллапса после войны богов. Визуальный стиль: детализированная fantasy-иллюстрация, тёмная палитра с золотыми и багровыми акцентами."></textarea>
    </div>
    <div class="char-field" style="margin-top:.75rem;">
      <label class="field-label">ХУДОЖЕСТВЕННЫЙ СТИЛЬ для image gen</label>
      <input type="text" id="s-art-style" placeholder="dark fantasy illustration, detailed, dramatic lighting, painterly" />
    </div>
  </div>

  <div class="box">
    <div class="box-title">ПЕРСОНАЖИ ПАРТИИ</div>
    <div class="char-grid" id="char-grid"></div>
  </div>

  <div class="box" style="background:transparent;border-color:#1a1a1a;">
    <div class="save-bar">
      <button class="save" id="btn-save">СОХРАНИТЬ</button>
      <span class="save-status" id="save-status"></span>
      <button class="danger" id="btn-reset">сбросить всё</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// Navigation
document.querySelectorAll(".nav-tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    $("page-" + tab.dataset.page).classList.add("active");
  };
});

// API key persistence
["openai-key"].forEach(id => {
  const el = $(id); if (!el) return;
  const saved = localStorage.getItem(id);
  if (saved) el.value = saved;
  el.addEventListener("input", e => localStorage.setItem(id, e.target.value.trim()));
});

// ── Settings ──────────────────────────────────
const DEFAULT_CHARS = Array(4).fill(null).map(() => ({ name:"", race:"", appearance:"", art:"" }));
const loadSettings = () => { try { return JSON.parse(localStorage.getItem("dnd-session")||"null"); } catch { return null; } };

const buildCharCards = (chars) => {
  const grid = $("char-grid");
  grid.innerHTML = "";
  chars.forEach((ch, i) => {
    const card = document.createElement("div");
    card.className = "char-card";

    const num = document.createElement("span");
    num.className = "char-num";
    num.textContent = `ПЕРСОНАЖ ${i+1}`;
    card.appendChild(num);

    const makeField = (labelText, inputId, type, placeholder, value) => {
      const wrap = document.createElement("div");
      wrap.className = "char-field";
      const lbl = document.createElement("label");
      lbl.textContent = labelText;
      wrap.appendChild(lbl);
      let inp;
      if (type === "textarea") {
        inp = document.createElement("textarea");
        inp.rows = 3;
        inp.placeholder = placeholder;
        inp.textContent = value || "";
      } else {
        inp = document.createElement("input");
        inp.type = "text";
        inp.placeholder = placeholder;
        inp.value = value || "";
      }
      inp.id = inputId;
      wrap.appendChild(inp);
      return wrap;
    };

    card.appendChild(makeField("ИМЯ", `c${i}-name`, "text", "Имя персонажа", ch.name));
    card.appendChild(makeField("КЛАСС / РАСА", `c${i}-race`, "text", "Паладин, человек", ch.race));
    card.appendChild(makeField("ОПИСАНИЕ ВНЕШНОСТИ", `c${i}-appearance`, "textarea", "Внешность для image prompt...", ch.appearance));

    // Art field
    const artWrap = document.createElement("div");
    artWrap.className = "char-field";
    const artLbl = document.createElement("label");
    artLbl.textContent = "РЕФЕРЕНС-АРТ";
    artWrap.appendChild(artLbl);

    const artRow = document.createElement("div");
    artRow.className = "art-upload";

    const artEl = document.createElement(ch.art ? "img" : "div");
    artEl.id = `c${i}-art`;
    artEl.dataset.src = ch.art || "";
    if (ch.art) { artEl.className = "art-thumb"; artEl.src = ch.art; }
    else { artEl.className = "art-placeholder"; artEl.textContent = "✦"; }
    artRow.appendChild(artEl);

    const artBtns = document.createElement("div");
    artBtns.style.cssText = "display:flex;flex-direction:column;gap:.4rem;";
    const btnUp = document.createElement("button");
    btnUp.className = "art-btn"; btnUp.textContent = "Загрузить";
    btnUp.onclick = () => triggerArt(i);
    const btnCl = document.createElement("button");
    btnCl.className = "art-btn danger";
    btnCl.style.cssText = "border-color:#c0504040;color:#c05040;";
    btnCl.textContent = "Удалить";
    btnCl.onclick = () => clearArt(i);
    artBtns.appendChild(btnUp); artBtns.appendChild(btnCl);
    artRow.appendChild(artBtns);

    const fileInp = document.createElement("input");
    fileInp.type = "file"; fileInp.id = `c${i}-file`;
    fileInp.accept = "image/*"; fileInp.style.display = "none";
    fileInp.onchange = function() { handleArt(i, this); };
    artRow.appendChild(fileInp);

    artWrap.appendChild(artRow);
    card.appendChild(artWrap);
    grid.appendChild(card);
  });
}
const triggerArt = i => $(`c${i}-file`).click();
const handleArt = (i, input) => {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.createElement("img"); img.className="art-thumb"; img.id=`c${i}-art`; img.src=e.target.result; img.dataset.src=e.target.result;
    $(`c${i}-art`).replaceWith(img);
  };
  reader.readAsDataURL(file);
};
const clearArt = i => {
  const ph = document.createElement("div"); ph.className="art-placeholder"; ph.id=`c${i}-art`; ph.dataset.src=""; ph.textContent="✦";
  $(`c${i}-art`).replaceWith(ph);
};

const initSettings = () => {
  console.log('initSettings called, char-grid:', $('char-grid'));
  const saved = loadSettings();
  buildCharCards(saved?.characters || DEFAULT_CHARS);
  if (saved) {
    const wn = $("s-world-name"); if (wn) wn.value = saved.worldName||"";
    const wd = $("s-world-desc"); if (wd) wd.value = saved.worldDesc||"";
    const as = $("s-art-style");  if (as) as.value = saved.artStyle||"";
  }
};

$("btn-save").onclick = () => {
  const data = {
    worldName: $("s-world-name").value,
    worldDesc: $("s-world-desc").value,
    artStyle:  $("s-art-style").value,
    characters: Array(4).fill(null).map((_,i) => ({
      name:       document.getElementById(`c${i}-name`)?.value||"",
      race:       document.getElementById(`c${i}-race`)?.value||"",
      appearance: document.getElementById(`c${i}-appearance`)?.value||"",
      art:        document.getElementById(`c${i}-art`)?.dataset?.src||"",
    })),
  };
  localStorage.setItem("dnd-session", JSON.stringify(data));
  const st = $("save-status"); st.textContent="Сохранено ✓"; st.style.opacity=1;
  setTimeout(() => { st.style.opacity=0; }, 2500);
};

$("btn-reset").onclick = () => {
  if (!confirm("Сбросить все настройки?")) return;
  localStorage.removeItem("dnd-session"); initSettings();
};

initSettings();

// ── Narrative context (memory) ────────────────
const narrativeContext = { events: [], totalChunks: 0 };

const getSessionContext = () => {
  const s = loadSettings();
  const chars = (s?.characters || []).filter(c => c.name).map(c =>
    `- ${c.name} (${c.race||"unknown"}): ${c.appearance||"no description"}`
  ).join("\n");
  const recentEvents = narrativeContext.events.slice(-6).map(e =>
    `[${e.type}] ${e.event}`
  ).join("\n");
  return {
    world: s?.worldName || "Unknown world",
    worldDesc: s?.worldDesc || "",
    artStyle: s?.artStyle || "fantasy illustration",
    chars, recentEvents,
  };
};

// ── Claude ────────────────────────────────────
let eventsCount = 0;

const sendToClaude = async (transcriptText) => {
  const key = $("openai-key").value.trim();
  if (!key) { log("OpenAI ключ не введён","err"); return; }
  dot("claude","busy");
  log("Отправляю в Claude...");

  const ctx = getSessionContext();

  const systemPrompt = `You are a D&D session narrator analyst. Your job is to extract the most significant narrative event from a transcript chunk and decide if it warrants a visual.

Setting: ${ctx.world}
World description: ${ctx.worldDesc}
Art style: ${ctx.artStyle}

Party characters:
${ctx.chars || "No characters defined"}

Recent events (for context):
${ctx.recentEvents || "Session just started"}

Rules:
- Return ONLY valid JSON, no other text
- generate_image: true for combat, new locations, important NPCs, magic, dramatic plot moments
- generate_image: false for small talk, planning, bookkeeping, silence
- image_prompt must be in English, detailed, include relevant character appearances, setting atmosphere and art style
- image_prompt must be DALL-E safe: avoid words like kill, blood, gore, brutal, slash, attack, weapon, sword, fight, battle, war, violent, dead, death — instead use: dramatic confrontation, heroic stance, intense struggle, dynamic scene, powerful motion, cinematic moment, fantasy encounter
- event and description must be in the same language as the transcript
- If transcript has no meaningful content, return null`;

  const userPrompt = `Transcript chunk:
"${transcriptText}"

Return a single JSON object:
{
  "event": "one sentence summary",
  "type": "combat|dialogue|discovery|travel|magic|plot|other",
  "characters": ["names from party or NPCs mentioned"],
  "generate_image": true or false,
  "image_prompt": "detailed scene for DALL-E, English only"
}

Or return null if nothing significant happened.`;

  try {
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type":"application/json", "x-openai-key": $("openai-key").value.trim() },
      body: JSON.stringify({
        model: "gpt-4o",
        max_tokens: 600,
        messages: [
          { role:"system", content: systemPrompt },
          { role:"user", content: userPrompt }
        ],
      }),
    });

    const data = await res.json();
    if (!res.ok) { log(`GPT error: ${data.error?.message||JSON.stringify(data)}`,"err"); dot("claude","err"); return; }

    const raw = (data.choices||[]).map(c=>c.message?.content||"").join("").trim();
    if (raw === "null" || !raw) { log("Claude: нет значимых событий"); dot("claude","on"); return; }

    const clean = raw.replace(/```json|```/g,"").trim();
    const event = JSON.parse(clean);
    if (!event?.event) { dot("claude","on"); return; }

    // Add to memory
    narrativeContext.events.push(event);
    eventsCount++;

    // Update stats — rough token estimate
    const tokenEst = (systemPrompt.length + userPrompt.length + raw.length) / 4;
    const costEst = parseFloat($("s-cost-c").textContent.replace("$","")) + (tokenEst / 1000000 * 3);
    $("s-cost-c").textContent = "$" + costEst.toFixed(4);
    $("s-events").textContent = eventsCount;
    $("events-count").textContent = `(${eventsCount})`;

    addEventCard(event);
    dot("claude","on");
    log(`Событие: [${event.type}] ${event.event}`, "ok");

    // Broadcast for viz tab (step 4)
    if (event.generate_image) {
      try {
        const bc = new BroadcastChannel("dnd-narrative");
        bc.postMessage({ type:"event", event });
        bc.close();
      } catch {}
    }

  } catch(e) {
    log("Claude parse error: "+e.message,"err");
    dot("claude","err");
  }
};

const addEventCard = (event) => {
  const list = $("events-list");
  const noEvents = list.querySelector(".no-events");
  if (noEvents) noEvents.remove();

  const card = document.createElement("div");
  card.className = "event-card" + (event.generate_image ? " has-image" : "");
  card.innerHTML = `
    <div class="event-top">
      <span class="event-type ${event.type||"other"}">${(event.type||"other").toUpperCase()}</span>
      <div style="display:flex;align-items:center;gap:.75rem;">
        ${event.generate_image ? '<span class="img-badge">✦ IMAGE</span>' : ''}
        <span class="event-time">${new Date().toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"})}</span>
      </div>
    </div>
    <div class="event-desc">${event.event}</div>
    ${(event.characters||[]).length ? `<div class="event-chars">${event.characters.map(c=>`<span class="event-char">${c}</span>`).join("")}</div>` : ""}
    ${event.generate_image && event.image_prompt ? `<div class="event-prompt">prompt: ${event.image_prompt}</div>` : ""}
  `;

  list.insertBefore(card, list.firstChild);
};

// ── Record logic ──────────────────────────────
const log = (msg, cls="inf") => {
  const el = document.createElement("span"); el.className=cls;
  el.textContent = `[${new Date().toLocaleTimeString("ru")}] ${msg}`;
  $("log").appendChild(el); $("log").scrollTop=9999;
};
const dot = (id, state) => $("dot-"+id).className = "dot"+(state?" "+state:"");
const setStat = (id, val) => $(id).textContent = val;

let recorder, audioCtx, timerInterval, seconds=0;
let chunksProcessed=0, totalMinutes=0, totalWords=0;
let stopping=false, chunkCount=0;

const updateTimer = () => {
  seconds++;
  $("timer").textContent = String(Math.floor(seconds/60)).padStart(2,"0")+":"+String(seconds%60).padStart(2,"0");
};

const addTranscriptBlock = (text, chunkNum, pending=false) => {
  const existing = document.getElementById("tc-"+chunkNum);
  if (existing) {
    const m = existing.querySelector(".chunk-meta");
    const t = existing.querySelector(".chunk-pending")||existing.querySelector(".chunk-text");
    if (m) m.textContent=`Чанк ${chunkNum}`;
    if (t) { t.textContent=text; t.className="chunk-text"; }
    return;
  }
  const emptyEl = document.querySelector(".empty"); if (emptyEl) emptyEl.remove();
  const div = document.createElement("div"); div.className="chunk-block"; div.id="tc-"+chunkNum;
  div.innerHTML = `<div class="chunk-meta">${pending?"⏳ Обрабатывается...":`Чанк ${chunkNum}`}</div><div class="${pending?"chunk-pending":"chunk-text"}">${text}</div>`;
  $("transcript").appendChild(div); $("transcript").scrollTop=9999;
};

const sendToWhisper = async (blob, chunkNum) => {
  const key = $("openai-key").value.trim();
  if (!key) { log("OpenAI ключ не введён","err"); return; }
  dot("wh","busy");
  addTranscriptBlock("Распознаю речь...", chunkNum, true);
  log(`Чанк ${chunkNum} → Whisper (${(blob.size/1024).toFixed(0)} KB)...`);
  const form = new FormData();
  form.append("file", new Blob([blob],{type:"audio/webm"}), `chunk-${chunkNum}.webm`);
  form.append("model","whisper-1");
  const lang = $("lang").value.trim(); if (lang) form.append("language",lang);
  try {
    const res = await fetch("/api/whisper",{method:"POST",headers:{"x-openai-key":key},body:form});
    const data = await res.json();
    if (!res.ok) { log(`Whisper error: ${data.error?.message}`,"err"); addTranscriptBlock("[ошибка]",chunkNum); dot("wh","err"); return; }
    const text = data.text?.trim()||"[тишина]";
    addTranscriptBlock(text, chunkNum);
    chunksProcessed++; totalMinutes += parseFloat($("chunk-sec").value||20)/60;
    totalWords += text.split(/\s+/).filter(Boolean).length;
    setStat("s-chunks",chunksProcessed); setStat("s-mins",totalMinutes.toFixed(1));
    setStat("s-cost-w","$"+(totalMinutes*0.006).toFixed(3));
    log(`Whisper ✓ чанк ${chunkNum}`, "ok");
    dot("wh","on");
    // Pass to Claude if not silence
    if (text !== "[тишина]" && text.length > 20) sendToClaude(text);
  } catch(e) { log("Fetch error: "+e.message,"err"); dot("wh","err"); }
};

const setupMeter = (stream, fillId, valId) => {
  const an=audioCtx.createAnalyser(); an.fftSize=256;
  audioCtx.createMediaStreamSource(stream).connect(an);
  const data=new Uint8Array(an.frequencyBinCount);
  const fill=$(fillId), val=$(valId);
  const tick=()=>{ if(audioCtx.state==="closed")return; an.getByteFrequencyData(data); const pct=Math.min(100,Math.round(data.reduce((a,b)=>a+b,0)/data.length*2.5)); fill.style.width=pct+"%"; fill.className="meter-fill"+(pct>80?" hot":pct>45?" mid":""); val.textContent=pct+"%"; requestAnimationFrame(tick); };
  tick();
};

$("btn-start").onclick = async () => {
  $("btn-start").disabled=true; stopping=false;
  log("Запрашиваю вкладку...");
  let tabStream;
  try { tabStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:{echoCancellation:false,noiseSuppression:false}}); dot("tab","on"); log("Вкладка ✓","ok"); }
  catch(e) { log("Ошибка: "+e.message,"err"); $("btn-start").disabled=false; return; }
  if (!tabStream.getAudioTracks().length) log("Нет аудио — поставь галочку 'Share tab audio'!","err");
  let micStream;
  try { micStream=await navigator.mediaDevices.getUserMedia({audio:true}); dot("mic","on"); log("Микрофон ✓","ok"); }
  catch(e) { log("Микрофон: "+e.message,"err"); }
  audioCtx=new AudioContext();
  const dest=audioCtx.createMediaStreamDestination();
  if (tabStream.getAudioTracks().length) audioCtx.createMediaStreamSource(tabStream).connect(dest);
  if (micStream) audioCtx.createMediaStreamSource(micStream).connect(dest);
  if (micStream) setupMeter(micStream,"meter-mic","meter-mic-val");
  if (tabStream.getAudioTracks().length) setupMeter(tabStream,"meter-tab","meter-tab-val");
  const chunkMs=parseInt($("chunk-sec").value||20)*1000;
  // VAD — track average volume from sources directly
  let vadSum = 0, vadSamples = 0;
  const vadMixer = audioCtx.createGain();
  if (tabStream.getAudioTracks().length) audioCtx.createMediaStreamSource(tabStream).connect(vadMixer);
  if (micStream) audioCtx.createMediaStreamSource(micStream).connect(vadMixer);
  const vadAnalyser = audioCtx.createAnalyser();
  vadAnalyser.fftSize = 256;
  vadMixer.connect(vadAnalyser);
  const vadData = new Uint8Array(vadAnalyser.frequencyBinCount);
  const vadTick = () => {
    if (audioCtx.state === "closed") return;
    vadAnalyser.getByteFrequencyData(vadData);
    vadSum += vadData.reduce((a,b)=>a+b,0) / vadData.length;
    vadSamples++;
    requestAnimationFrame(vadTick);
  };
  vadTick();

  const startNewChunk=()=>{
    vadSum = 0; vadSamples = 0;
    const rec=new MediaRecorder(dest.stream,{mimeType:"audio/webm;codecs=opus"});
    rec.ondataavailable=e=>{
      if(e.data?.size>500){
        const avgLevel = vadSamples > 0 ? vadSum / vadSamples : 0;
        const threshold = parseFloat($("vad-threshold").value||4);
        if (avgLevel < threshold) {
          log(`Чанк пропущен — тишина (уровень: ${avgLevel.toFixed(1)})`);
          return;
        }
        chunkCount++;
        log(`VAD ок (уровень: ${avgLevel.toFixed(1)}) — отправляю чанк ${chunkCount}`);
        sendToWhisper(new Blob([e.data],{type:"audio/webm"}),chunkCount);
      }
    };
    rec.start(); recorder=rec;
    setTimeout(()=>{ if(rec.state!=="inactive"){rec.stop(); if(recorder===rec&&!stopping)startNewChunk();} },chunkMs);
  };
  startNewChunk();
  dot("rec","on"); log(`Запись началась. Чанк каждые ${$("chunk-sec").value||20} сек.`,"ok");
  seconds=0; timerInterval=setInterval(updateTimer,1000);
  $("btn-stop").disabled=false;
  tabStream.getAudioTracks().forEach(t=>t.onended=()=>{ log("Захват прерван","err"); stopAll(); });
};

const stopAll=()=>{ stopping=true; if(recorder?.state!=="inactive")recorder?.stop(); audioCtx?.close(); clearInterval(timerInterval); dot("tab","");dot("mic","");dot("rec",""); $("btn-stop").disabled=true; $("btn-start").disabled=false; log("Остановлено"); };
$("btn-stop").onclick=stopAll;
</script>
</body>
