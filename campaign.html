<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>DreamStory — Кампания</title>
<link rel="stylesheet" href="/theme.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }
.nav { display:flex; align-items:center; background:var(--bg2); border-bottom:1px solid var(--border); padding:0 1.5rem; height:46px; position:sticky; top:0; z-index:10; }
.nav-brand { font-size:12px; letter-spacing:.18em; color:var(--accent); flex-shrink:0; }
.nav-campaign { font-size:11px; color:var(--faint); flex:1; padding:0 1.5rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.nav-links { display:flex; align-items:center; gap:.25rem; flex-shrink:0; }
.nav-link { font-family:monospace; font-size:10px; letter-spacing:.08em; color:var(--dim); text-decoration:none; padding:.3rem .7rem; border:1px solid transparent; border-radius:3px; transition:all .2s; white-space:nowrap; }
.nav-link:hover { color:var(--text); border-color:var(--border); }
.theme-toggle { background:none; border:1px solid var(--border); border-radius:3px; padding:.3rem .6rem; cursor:pointer; font-size:13px; color:var(--dim); transition:all .2s; margin-left:.5rem; }
.theme-toggle:hover { border-color:var(--accent); color:var(--accent); }
.page { padding:2rem 1.5rem; max-width:700px; margin:0 auto; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; gap:1rem; flex-wrap:wrap; }
.page-title { font-size:11px; letter-spacing:.15em; color:var(--dim); }
.header-actions { display:flex; gap:.5rem; }
.btn { font-family:monospace; font-size:11px; letter-spacing:.08em; padding:.45rem 1rem; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; border-radius:3px; transition:all .2s; }
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn.primary { border-color:rgba(74,175,114,.5); color:var(--accent); }
.btn.primary:hover { background:var(--accent2); }
.btn.danger { border-color:rgba(192,80,64,.4); color:var(--red); font-size:10px; padding:.3rem .6rem; }
.btn.danger:hover { background:var(--red2); }
.btn.viz { border-color:rgba(192,132,240,.4); color:#c084f0; }
.btn.viz:hover { background:rgba(192,132,240,.1); }
.list { display:flex; flex-direction:column; gap:.6rem; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:1rem 1.25rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; transition:border-color .2s; }
.card:hover { border-color:rgba(74,175,114,.3); }
.card-info { flex:1; min-width:0; cursor:pointer; }
.card-name { font-size:14px; color:var(--text); margin-bottom:.2rem; }
.card-meta { font-size:11px; color:var(--dim); }
.card-last { font-size:11px; color:var(--faint); margin-top:.3rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-style:italic; }
.card-actions { display:flex; gap:.5rem; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
.empty { text-align:center; padding:4rem 2rem; font-size:12px; color:var(--faint); letter-spacing:.06em; line-height:2; }
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.75); display:none; align-items:center; justify-content:center; z-index:100; }
.modal-bg.open { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:1.75rem; width:100%; max-width:380px; display:flex; flex-direction:column; gap:1rem; }
.modal-title { font-size:11px; letter-spacing:.12em; color:var(--muted); }
.modal-inp { width:100%; background:var(--input-bg); border:1px solid var(--input-border); border-radius:3px; padding:.5rem .75rem; color:var(--text); font-family:monospace; font-size:13px; outline:none; transition:border-color .2s; }
.modal-inp:focus { border-color:var(--accent); }
.modal-row { display:flex; gap:.75rem; }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">✦ DREAMSTORY</span>
  <span class="nav-campaign" id="nav-campaign"></span>
  <div class="nav-links">
    <a class="nav-link" href="/">← Кампании</a>
    <a class="nav-link" href="/settings.html">Настройки</a>
    <a class="nav-link" id="nav-viz-campaign" href="#">Визуал</a>
    <button class="theme-toggle" id="theme-btn">☀</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <span class="page-title">СЕССИИ</span>
    <div class="header-actions">
      <button class="btn primary" id="btn-new-session">+ Новая сессия</button>
    </div>
  </div>
  <div class="list" id="sessions-list">
    <div class="empty">Загрузка...</div>
  </div>
</div>

<div class="modal-bg" id="modal-session">
  <div class="modal">
    <span class="modal-title">НОВАЯ СЕССИЯ</span>
    <input class="modal-inp" type="text" id="new-session-name" placeholder="Сессия 1 — Прибытие в город..." />
    <div class="modal-row">
      <button class="btn primary" id="modal-session-create" style="flex:1;">Создать</button>
      <button class="btn" id="modal-session-cancel">Отмена</button>
    </div>
  </div>
</div>

<script>
// ── Theme ─────────────────────────────────────
document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
const _tb = document.getElementById("theme-btn");
_tb.textContent = (localStorage.getItem("theme")||"dark") === "dark" ? "☀" : "☾";
_tb.onclick = () => {
  const t = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("theme", t);
  _tb.textContent = t === "dark" ? "☀" : "☾";
};

const $ = id => document.getElementById(id);
const CAMPAIGN_ID   = localStorage.getItem("active-campaign-id");
const CAMPAIGN_NAME = localStorage.getItem("active-campaign-name") || "Кампания";
const TOKEN         = localStorage.getItem("sb-token");

if (!CAMPAIGN_ID || !TOKEN) window.location.href = "/";

$("nav-campaign").textContent = CAMPAIGN_NAME;
$("nav-viz-campaign").href = `/viz.html?campaign=${CAMPAIGN_ID}`;

const api = (path, opts = {}) => fetch(path, {
  ...opts,
  headers: { "Content-Type":"application/json", "Authorization": `Bearer ${TOKEN}`, ...(opts.headers||{}) },
}).then(r => r.json());

const loadSessions = async () => {
  const data = await api(`/api/sessions?campaign_id=${CAMPAIGN_ID}`);
  const list = $("sessions-list");
  if (!Array.isArray(data) || data.length === 0) {
    list.innerHTML = '<div class="empty">Нет сессий.<br>Создай первую!</div>';
    return;
  }
  list.innerHTML = "";
  data.forEach(s => {
    const card = document.createElement("div");
    card.className = "card";
    const d = new Date(s.created_at);
    card.innerHTML = `
      <div class="card-info" onclick="openSession('${s.id}','${s.name.replace(/'/g,"\\'")}')">
        <div class="card-name">${s.name}</div>
        <div class="card-meta">
          ${d.toLocaleDateString("ru")} · ${d.toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"})}
          ${s.event_count ? ` · ${s.event_count} событий` : ""}
          ${s.image_count ? ` · ${s.image_count} изображений` : ""}
        </div>
        ${s.last_event ? `<div class="card-last">${s.last_event}</div>` : ""}
      </div>
      <div class="card-actions">
        <button class="btn primary" onclick="openSession('${s.id}','${s.name.replace(/'/g,"\\'")}')">Открыть</button>
        <button class="btn viz" onclick="openViz('${s.id}')">Визуал</button>
        <button class="btn danger" onclick="deleteSession(event,'${s.id}')">×</button>
      </div>
    `;
    list.appendChild(card);
  });
};

const openSession = (id, name) => {
  localStorage.setItem("active-session-id", id);
  localStorage.setItem("active-session-name", name);
  window.location.href = "/session.html";
};
const openViz = (id) => window.open(`/viz.html?session=${id}`, "_blank");
const deleteSession = async (e, id) => {
  e.stopPropagation();
  if (!confirm("Удалить сессию и все её данные?")) return;
  await api(`/api/sessions?id=${id}`, { method: "DELETE" });
  loadSessions();
};

$("btn-new-session").onclick = () => { $("modal-session").classList.add("open"); $("new-session-name").focus(); };
$("modal-session-cancel").onclick = () => $("modal-session").classList.remove("open");
$("modal-session-create").onclick = async () => {
  const name = $("new-session-name").value.trim() || "Новая сессия";
  const data = await api("/api/sessions", {
    method: "POST",
    body: JSON.stringify({ name, campaign_id: CAMPAIGN_ID }),
  });
  $("modal-session").classList.remove("open");
  $("new-session-name").value = "";
  if (data.id) openSession(data.id, data.name);
};
$("new-session-name").onkeydown = e => { if (e.key === "Enter") $("modal-session-create").click(); };

loadSessions();
</script>
</body>
</html>
